name: secrets-scan

# Second layer (independent of the local pre-commit hook): scan every push and
# PR for committed secrets. A leak that slips a developer's local hook is caught
# here before it can be merged.
on:
  push:
  pull_request:

jobs:
  gitleaks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # full history so gitleaks scans every commit, not just the tip

      - name: Install gitleaks
        run: |
          VERSION=8.30.1
          curl -sSL "https://github.com/gitleaks/gitleaks/releases/download/v${VERSION}/gitleaks_${VERSION}_linux_x64.tar.gz" \
            | tar -xz gitleaks
          sudo mv gitleaks /usr/local/bin/
          gitleaks version

      - name: Scan for secrets
        run: gitleaks detect --no-banner --redact --config .gitleaks.toml
